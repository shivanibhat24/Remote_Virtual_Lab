<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 Remote Lab Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0e17;
            --panel: #111827;
            --border: #1f2937;
            --primary: #10b981;
            --accent: #3b82f6;
            --text: #f3f4f6;
            --muted: #9ca3af;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--primary);
            margin: 0 0 10px 0;
        }
        .auth-panel {
            background-color: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            font-size: 18px;
            border-radius: 4px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-right: 10px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .dashboard {
            display: none;
            gap: 20px;
        }
        .main-col {
            flex: 2;
        }
        .side-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .card h3 {
            margin-top: 0;
            color: var(--muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        canvas {
            width: 100% !important;
            height: 400px !important;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .controls button {
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
        }
        .controls button:hover {
            background-color: var(--border);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            color: var(--primary);
            margin: 10px 0;
        }
        #status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ef4444;
            margin-right: 8px;
        }
        .connected {
            background-color: var(--primary) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Global Laboratory Interface</h1>
        <div><span id="status-indicator"></span><span id="status-text" style="color: var(--muted);">Waiting for Session ID...</span></div>
    </div>

    <div class="auth-panel" id="auth-panel">
        <p style="color: var(--muted); margin-bottom: 20px;">Enter the 6-character Session ID generated by the Host GUI to connect globally via MQTT Relay.</p>
        <input type="text" id="session-id" placeholder="Ex: X9T4K2" maxlength="6">
        <button onclick="connect_cloud()">CONNECT</button>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="main-col">
            <div class="card">
                <h3>Live Oscilloscope Reader</h3>
                <canvas id="dsoChart"></canvas>
            </div>
        </div>
        <div class="side-col">
            <div class="card">
                <h3>Action Panel</h3>
                <div class="controls">
                    <button onclick="sendCommand('CONF:VOLT:DC')">Voltmeter Mode</button>
                    <button onclick="sendCommand('CONF:CURR:DC')">Ammeter Mode</button>
                    <button onclick="sendCommand('CONF:WAVE:TYPE SQ')">Set Square Wave</button>
                    <button onclick="sendCommand('CONF:WAVE:TYPE SI')">Set Sine Wave</button>
                    <button onclick="sendCommand('CONF:FREQ 100')">Freq = 100Hz</button>
                    <button onclick="sendCommand('CONF:FREQ 1000')">Freq = 1000Hz</button>
                </div>
            </div>
            <div class="card">
                <h3>Statistics</h3>
                <div style="color: var(--muted);">Mean Voltage</div>
                <div class="stat-value" id="stat-mean">0.000 V</div>
                <div style="color: var(--muted);">Peak-to-Peak (Vpp)</div>
                <div class="stat-value" id="stat-vpp" style="color: var(--accent);">0.000 V</div>
                <div style="color: var(--muted);">Dominant Freq</div>
                <div class="stat-value" id="stat-freq" style="color: #ffb86c;">0 Hz</div>
            </div>
        </div>
    </div>
</div>

<script>
    let client = null;
    let base_topic = "";
    
    // Initialize Chart
    const ctx = document.getElementById('dsoChart').getContext('2d');
    const dsoChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(500).fill(''),
            datasets: [{
                label: 'Voltage (V)',
                data: Array(500).fill(0),
                borderColor: '#10b981',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                x: { display: false },
                y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' }, suggestedMin: 0, suggestedMax: 5 }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    function updateStatus(msg, connected=false) {
        document.getElementById("status-text").innerText = msg;
        const ind = document.getElementById("status-indicator");
        if (connected) ind.classList.add("connected");
        else ind.classList.remove("connected");
    }

    function connect_cloud() {
        const sid = document.getElementById("session-id").value.toUpperCase().trim();
        if (sid.length !== 6) {
            alert("Invalid Session ID. Must be 6 characters.");
            return;
        }
        
        base_topic = `stm32lab/${sid}`;
        updateStatus(`Connecting to Mosquitto Cloud...`);
        
        // Connect to Eclipse Mosquitto Public web socket (WSS protocol 8081)
        client = mqtt.connect("wss://test.mosquitto.org:8081/mqtt");

        client.on("connect", () => {
            updateStatus(`Connected to Board [${sid}]`, true);
            document.getElementById("auth-panel").style.display = "none";
            document.getElementById("dashboard").style.display = "flex";
            
            // Subscribe to data
            client.subscribe(`${base_topic}/data`);
        });

        client.on("message", (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                
                // Update graph
                if (payload.s && payload.s.length > 0) {
                    dsoChart.data.datasets[0].data = payload.s;
                    dsoChart.update();
                }
                
                // Update stats
                if (payload.st) {
                    if (payload.st.mean !== undefined) document.getElementById("stat-mean").innerText = payload.st.mean.toFixed(3) + " V";
                    if (payload.st.vpp !== undefined) document.getElementById("stat-vpp").innerText = payload.st.vpp.toFixed(3) + " V";
                    if (payload.st.dom_freq !== undefined) document.getElementById("stat-freq").innerText = payload.st.dom_freq.toFixed(1) + " Hz";
                }
            } catch (e) {
                console.error("Parse error", e);
            }
        });

        client.on("error", (err) => {
            updateStatus("Connection Error!", false);
            console.error(err);
        });

        client.on("close", () => {
            updateStatus("Disconnected", false);
        });
    }

    function sendCommand(cmd) {
        if (client && client.connected) {
            client.publish(`${base_topic}/cmds`, cmd);
        } else {
            alert("Not connected to cloud relay.");
        }
    }
</script>

</body>
</html>
